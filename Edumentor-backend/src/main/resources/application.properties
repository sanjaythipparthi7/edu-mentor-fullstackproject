spring.application.name=EduMentor

# ── MySQL Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/edumentor_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sanjay250303
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server Port ─────────────────────────────────────────────────
server.port=8080

# ── JWT Secret ─────────────────────────────────────────────────
# Use a strong 256-bit secret in production
jwt.secret=edumentor-super-secret-key-change-in-production-must-be-256bit
jwt.expiration=86400000

# ── Logging ─────────────────────────────────────────────────────
logging.level.com.edumentor=DEBUG
logging.level.org.springframework.security=INFO
